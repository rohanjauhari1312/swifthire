<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #0f0f0f;
      color: #f0f0f0;
    }

    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #1e1e1e;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #fff;
    }
    .header p {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .actions {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: 0.85; }

    #btn-send {
      background: #d97706;
      color: #fff;
    }
    #btn-email {
      background: #1a1a1a;
      color: #f0f0f0;
      border: 1px solid #2a2a2a;
    }
    #btn-fill {
      background: #1a3a2a;
      color: #f0f0f0;
      border: 1px solid #2a4a3a;
    }
    #btn-apply {
      display: none;
      background: #1a2a3a;
      color: #f0f0f0;
      border: 1px solid #2a3a4a;
    }

    .btn-icon { font-size: 15px; line-height: 1; }
    .btn-text { flex: 1; }
    .btn-label { display: block; }
    .btn-sub {
      display: block;
      font-size: 11px;
      opacity: 0.6;
      font-weight: 400;
      margin-top: 1px;
    }

    .status-area {
      padding: 0 18px 14px;
      min-height: 20px;
    }
    #status { font-size: 12px; color: #888; }
    #status.error   { color: #e05252; }
    #status.success { color: #4caf82; }

    #email-result, #job-picker {
      display: none;
      margin-top: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      padding: 10px 12px;
    }
    #job-picker .name { font-size: 13px; font-weight: 500; color: #f0f0f0; }
    #job-picker select, #job-picker textarea {
      margin-top: 6px;
      width: 100%;
      padding: 7px 8px;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 5px;
      color: #f0f0f0;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
    }
    #picker-confirm {
      margin-top: 8px;
      width: 100%;
      padding: 7px;
      background: #1a3a2a;
      color: #4caf82;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
    }
    #picker-cancel {
      margin-top: 6px;
      width: 100%;
      padding: 6px;
      background: #2a2a2a;
      color: #999;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
    }
    #email-result .label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    #email-result .name  { font-size: 13px; font-weight: 500; color: #f0f0f0; }
    #email-result .email { font-size: 12px; color: #d97706; margin-top: 2px; word-break: break-all; }
    #copy-btn, #compose-btn {
      margin-top: 8px;
      width: 100%;
      padding: 6px;
      background: #2a2a2a;
      color: #ccc;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
    }
    #compose-btn {
      background: #1a3a2a;
      color: #4caf82;
    }

    .settings {
      padding: 0 18px 14px;
      border-top: 1px solid #1a1a1a;
    }
    .settings summary {
      font-size: 11px;
      color: #444;
      cursor: pointer;
      padding-top: 10px;
      list-style: none;
    }
    .settings summary:hover { color: #666; }
    .settings input {
      margin-top: 8px;
      width: 100%;
      padding: 7px 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 5px;
      color: #f0f0f0;
      font-size: 12px;
      font-family: monospace;
    }
    .settings input::placeholder { color: #444; }
    .save-key {
      margin-top: 6px;
      width: 100%;
      padding: 6px;
      background: #2a2a2a;
      color: #ccc;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>SwiftHire</h1>
    <p>Job application automation</p>
  </div>

  <div class="actions">
    <button id="btn-send">
      <span class="btn-icon">&#x2197;</span>
      <span class="btn-text">
        <span class="btn-label">Send to Claude</span>
        <span class="btn-sub">Extracts job description from this page</span>
      </span>
    </button>

    <button id="btn-email">
      <span class="btn-icon">&#x40;</span>
      <span class="btn-text">
        <span class="btn-label">Email &amp; Compose</span>
        <span class="btn-sub">Finds contact and opens Outlook draft</span>
      </span>
    </button>

    <button id="btn-fill">
      <span class="btn-icon">&#x270F;</span>
      <span class="btn-text">
        <span class="btn-label">Fill Form</span>
        <span class="btn-sub">Fills fields and sends AI questions to Claude</span>
      </span>
    </button>

    <button id="btn-apply">
      <span class="btn-icon">&#x2713;</span>
      <span class="btn-text">
        <span class="btn-label">Apply AI Answers</span>
        <span class="btn-sub">Reads Claude's response and fills remaining fields</span>
      </span>
    </button>
  </div>

  <div class="status-area">
    <div id="status"></div>
    <div id="job-picker">
      <div class="label">Composing for</div>
      <div class="name" id="picker-name"></div>
      <div class="label" style="margin-top:8px;">Job (JD + subject)</div>
      <select id="picker-select"></select>
      <div class="label" style="margin-top:8px;">Or paste the job description</div>
      <textarea id="picker-jd" rows="4" placeholder="Paste the JD here if it's not in the list above"></textarea>
      <div class="label" style="margin-top:8px;">Resume to attach</div>
      <select id="picker-resume"></select>
      <button id="picker-confirm">Compose Mail</button>
      <button id="picker-cancel">Cancel</button>
    </div>
    <div id="email-result">
      <div class="label">Contact found</div>
      <div class="name" id="result-name"></div>
      <div class="email" id="result-email"></div>
      <button id="copy-btn">Copy email</button>
      <button id="compose-btn">Compose Mail with resume</button>
    </div>
  </div>

  <details class="settings">
    <summary>API keys</summary>
    <input type="password" id="apollo-key" placeholder="Hunter API key" />
    <button class="save-key" id="save-key">Save Hunter key</button>
    <input type="password" id="claude-key" placeholder="Claude API key" style="margin-top:10px;" />
    <button class="save-key" id="save-claude-key">Save Claude key</button>
  </details>

  <script src="popup.js"></script>
</body>
</html>
